services:
  - type: web
    name: vigility-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vigility-db
          property: connectionString

databases:
  - name: vigility-db
    databaseName: vigility_db
    user: vigility_user